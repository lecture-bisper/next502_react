<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ajax 와 primise 사용</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>

  <style>
  </style>

  <script>
    $(document).ready(function() {

      $("#btn1").on("click", function() {
        // 프로미스를 사용하는 함수를 호출
        getData(10, 3)
          // 프로미스 사용 성공 시 실행되는 함수, resolve() 실행 시 자동 호출
          .then(function(data) {
            let result =
`num1 : ${data.num1}
num2 : ${data.num2}
result : ${data.result}`;
            alert(`버튼 1 클릭 후 결과값 : \n${result}`);
          })
          // 프로미스 사용 중 오류 발생 시 실행되는 함수, reject() 실행 시 자동 호출
          .catch(function(err) {
            alert(err);
          });
      });

      $("#btn2").on("click", function() {
        getData(10, 0)
          .then(function(data) {
            alert(`버튼 2 클릭 후 결과값 : ${data}`);
          })
          .catch(function(err) {
            alert(err);
          });
      });
    });

    // 함수 내부에서 Promise 객체를 생성하여 사용하는 함수
    function getData(x, y) {
      // Promise 객체 생성
      return new Promise(function(resolve, reject) {
        // Promise 를 통해서 ajax 비동기 통신을 진행
        $.ajax({
          url: 'http://localhost:8080/async/div',
          type: 'post',
          data: {num1: x, num2: y},
          // ajax 비동기 통신 성공 시
          success: function(resData) {
            // 성공 시 받아온 데이터가 success 이면 resolve() 호출
            if (resData.result == "success") {
              resolve(resData.data);
            }
            // 성공 시 받아온 데이터가 success 가 아니면 reject() 호출
            else {
              reject('서버 내부 오류 발생');
            }
          },
          // ajax 비동기 통신 실패 시
          error: function() {
            reject("ajax 통신 실패");
          }
        });
      });
    }
  </script>

</head>
<body>

<div class="container mt-5">
<!--  클릭 시 10, 3 을 서버로 전달 -->
  <button type="button" class="btn btn-success" id="btn1">버튼 1 클릭</button>
<!--  클릭 시 10, 0 을 서버로 전달 -->
  <button type="button" class="btn btn-danger" id="btn2">버튼 2 클릭</button>
</div>
</body>
</html>
